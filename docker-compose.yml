# Ambiente de desenvolvimento local — PostgreSQL opcional
#
# ATENÇÃO: Este compose NÃO é usado pelo stack principal do projeto.
# O banco de produção e desenvolvimento é o Supabase PostgreSQL:
#   https://vkzefmedwxvpqcivparz.supabase.co
#
# Use este compose APENAS se quiser um Postgres local isolado para
# experimentos — ele NÃO substitui o Supabase (sem Auth, sem RLS do projeto).
#
# Fluxo recomendado para dev:
#   1. Configurar .env com chaves Supabase (ver .env.example)
#   2. Aplicar supabase/migrations/001_initial_schema.sql no Supabase
#   3. pnpm db:seed && pnpm dev
#
# Uso deste compose (opcional):
#   docker compose up -d
#   docker compose down
#   docker compose down -v   # apaga dados locais

services:
  postgres:
    image: postgres:16-alpine
    container_name: abe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: painel_abe
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d painel_abe']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: abe-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
